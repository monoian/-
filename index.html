<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊預算小工具</title>
  <meta name="description" content="輕鬆規劃你的旅遊預算，計算總花費、每日平均與最大支出項目。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>✈️ 旅遊預算小工具</h1>
      <p class="subtitle">規劃你的旅程，輕鬆掌握每一筆花費</p>
    </header>

    <main class="container">
      <form id="budget-form" class="card" novalidate>
        <div class="field">
          <label for="days">旅行天數</label>
          <div class="input-wrap">
            <input type="number" id="days" name="days" min="1" step="1" inputmode="numeric" placeholder="例如：5">
            <span class="unit">天</span>
          </div>
        </div>

        <h2 class="section-title">各項預算（元）</h2>

        <div class="field">
          <label for="flight">機票</label>
          <div class="input-wrap">
            <span class="prefix">$</span>
            <input type="number" id="flight" name="flight" min="0" step="any" inputmode="decimal" placeholder="0">
          </div>
        </div>

        <div class="field">
          <label for="accommodation">住宿</label>
          <div class="input-wrap">
            <span class="prefix">$</span>
            <input type="number" id="accommodation" name="accommodation" min="0" step="any" inputmode="decimal" placeholder="0">
          </div>
        </div>

        <div class="field">
          <label for="transport">當地交通</label>
          <div class="input-wrap">
            <span class="prefix">$</span>
            <input type="number" id="transport" name="transport" min="0" step="any" inputmode="decimal" placeholder="0">
          </div>
        </div>

        <div class="field">
          <label for="food">餐飲</label>
          <div class="input-wrap">
            <span class="prefix">$</span>
            <input type="number" id="food" name="food" min="0" step="any" inputmode="decimal" placeholder="0">
          </div>
        </div>

        <div class="field">
          <label for="tickets">景點門票</label>
          <div class="input-wrap">
            <span class="prefix">$</span>
            <input type="number" id="tickets" name="tickets" min="0" step="any" inputmode="decimal" placeholder="0">
          </div>
        </div>

        <div class="field">
          <label for="shopping">購物</label>
          <div class="input-wrap">
            <span class="prefix">$</span>
            <input type="number" id="shopping" name="shopping" min="0" step="any" inputmode="decimal" placeholder="0">
          </div>
        </div>

        <div class="field">
          <label for="other">其他</label>
          <div class="input-wrap">
            <span class="prefix">$</span>
            <input type="number" id="other" name="other" min="0" step="any" inputmode="decimal" placeholder="0">
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary">計算</button>
          <button type="button" id="clear-btn" class="btn btn-secondary">清除</button>
        </div>

        <p id="error-msg" class="error-msg" role="alert" hidden></p>
      </form>

      <section id="results" class="card results" hidden aria-live="polite">
        <h2 class="section-title">計算結果</h2>

        <div class="summary">
          <div class="summary-item highlight">
            <span class="summary-label">總預算</span>
            <span class="summary-value" id="total-value">$0</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">每日平均花費</span>
            <span class="summary-value" id="daily-value">$0</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">最大支出項目</span>
            <span class="summary-value" id="max-value">—</span>
          </div>
        </div>

        <h3 class="breakdown-title">支出明細</h3>
        <ul class="breakdown" id="breakdown"></ul>
      </section>
    </main>

    <footer class="app-footer">
      <p>用心規劃，玩得更安心 🧳</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
