<html lang="zh-TW">
<head>

<title>03月 重點進口車 副所長獎勵報表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--card:rgba(30,41,59,0.75);--border:rgba(148,163,184,0.1);--text:#e2e8f0;--muted:#64748b;--accent:#3b82f6;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--purple:#8b5cf6}
body{font-family:'Noto Sans TC','Helvetica Neue',sans-serif;background:linear-gradient(135deg,var(--bg) 0%,#1e293b 50%,var(--bg) 100%);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.bg-dots{position:fixed;inset:0;opacity:.03;background-image:radial-gradient(circle at 1px 1px,#94a3b8 1px,transparent 0);background-size:32px 32px;pointer-events:none}
header{background:linear-gradient(90deg,rgba(59,130,246,.12),rgba(139,92,246,.08),rgba(59,130,246,.12));border-bottom:1px solid rgba(59,130,246,.15);padding:16px 20px;backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.header-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 14px rgba(59,130,246,.35);flex-shrink:0}
.header-text h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.header-text p{font-size:11px;color:var(--muted);margin-top:1px}
.container{max-width:1000px;margin:0 auto;padding:16px 16px 40px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
@media(min-width:640px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--card);border-radius:12px;padding:14px 16px;border:1px solid var(--border)}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:800}
.stat-sub{font-size:10px;color:var(--muted);margin-top:3px}
.cars{background:var(--card);border-radius:12px;padding:14px 16px;border:1px solid var(--border);margin-bottom:18px;display:flex;gap:8px;flex-wrap:wrap}
.car-tag{padding:6px 12px;border-radius:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);font-size:12px}
.car-tag b{color:var(--accent);margin-left:6px}
.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:10px 20px;border-radius:10px;border:none;background:rgba(148,163,184,.08);color:var(--muted);font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
.tab.active{background:rgba(59,130,246,.25);color:#93c5fd;font-weight:700}
.branch{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:16px;overflow:hidden}
.branch-head{padding:12px 16px;background:rgba(15,23,42,.5);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.branch-info{display:flex;align-items:center;gap:10px}
.grade{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;background:rgba(148,163,184,.1);color:var(--muted);border:1px solid var(--border)}
.grade.S{background:rgba(250,204,21,.15);color:#fbbf24;border-color:rgba(250,204,21,.3)}
.branch-name{font-size:15px;font-weight:700}
.branch-code{font-size:12px;color:var(--muted);margin-left:4px}
.branch-chief{font-size:11px;color:var(--muted)}
.branch-stats{font-size:12px;display:flex;gap:12px;flex-wrap:wrap}
.branch-stats span{white-space:nowrap}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:700px}
th{padding:10px 10px;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
th.r{text-align:right}
td{padding:9px 10px;font-size:13px;border-bottom:1px solid rgba(148,163,184,.05)}
td.r{text-align:right}
td.mono{font-family:monospace;color:#93c5fd}
tr.row:active{background:rgba(59,130,246,.08)}
.bar-wrap{display:flex;align-items:center;gap:6px;min-width:130px}
.bar-bg{flex:1;height:8px;border-radius:4px;background:rgba(148,163,184,.12);overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.bar-fill.green{background:linear-gradient(90deg,var(--green),#34d399)}
.bar-fill.yellow{background:linear-gradient(90deg,var(--yellow),#fbbf24)}
.bar-fill.red{background:linear-gradient(90deg,var(--red),#f87171)}
.pct{font-size:12px;font-weight:700;min-width:40px;text-align:right}
.bonus{font-weight:700;font-size:13px}
.bonus.has{color:var(--green)}
.total-bonus{font-weight:800;font-size:14px}
.total-bonus.has{color:var(--yellow)}
.actual{font-size:17px;font-weight:800}
.actual.t4{color:var(--green)}
.actual.t3{color:var(--yellow)}
.actual.t0{color:var(--muted)}
.detail-hint{padding:6px 16px;font-size:10px;color:var(--muted);background:rgba(15,23,42,.3)}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:640px){.overlay{align-items:center;padding:20px}}
.modal{background:#1e293b;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:80vh;overflow-y:auto;border:1px solid var(--border);animation:slideUp .25s ease}
@media(min-width:640px){.modal{border-radius:16px;max-width:650px}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-head h3{font-size:16px}
.close-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px}
.modal table{min-width:500px}
.modal td,.modal th{padding:8px}
.double-tag{color:var(--yellow);font-size:10px;font-weight:700}
.rules{background:rgba(139,92,246,.06);border-radius:12px;padding:16px 18px;border:1px solid rgba(139,92,246,.15);margin-top:8px}
.rules h3{font-size:13px;color:#a78bfa;margin-bottom:8px}
.rules p{font-size:12px;color:var(--muted);line-height:1.8;margin:0}
.update-info{text-align:center;padding:20px;font-size:11px;color:var(--muted)}
::-webkit-scrollbar{height:5px;width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(148,163,184,.2);border-radius:3px}
</style>
</head>

• <b style="color:var(--yellow)">1計2台</b>：準26 CROWN HV、正25 SIENNA HV 每台以2台計算<br>
• <b style="color:var(--text)">重點車種</b>：RAV4 ADV(133萬)、bZ4X、CROWN HV、GR YARIS、SIENNA HV</p></div>`;

h+=`<div class="update-info">資料更新時間：${new Date().toLocaleDateString("zh-TW")} ｜ 販賣日 03/01 - 03/30</div>`;

app.innerHTML=h;
}

function switchTab(r){activeRegion=r;render()}

function showDetail(code,name){
const orders=secOrders[code]||[];
if(!orders.length){alert("此課別尚無已販賣的訂單");return}
let h=`<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
<div class="modal-head"><h3>${name} (${code}) — 訂單明細</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
<div class="table-wrap"><table>
<tr><th>訂單編號</th><th>車名</th><th>年式</th><th>領照人</th><th>販賣日</th><th>計台</th></tr>`;
orders.forEach(o=>{
h+=`<tr><td class="mono">${o.n}</td><td>${o.c}</td><td>${o.y}</td><td>${o.cu}</td><td>${o.s}</td>
<td style="text-align:center;font-weight:700;${o.u>1?"color:var(--yellow)":""}">${o.u}${o.u>1?" ★":""}</td></tr>`;
});
h+=`</table></div>`;
if(orders.some(o=>o.u>1))h+=`<div class="double-tag" style="margin-top:10px">★ 1計2台（準26 CROWN HV / 正25 SIENNA HV）</div>`;
h+=`</div></div>`;
document.body.insertAdjacentHTML("beforeend",h);
}

function closeModal(){const el=document.querySelector(".overlay");if(el)el.remove()}

render();
</script>
</body>
</html>
